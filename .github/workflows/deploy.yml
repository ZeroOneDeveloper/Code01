name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      ref:
        description: "Deploy target branch or tag"
        required: true
        default: "main"
      deploy_path:
        description: "Remote project path"
        required: true
        default: "~/Code01"

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref_name }}
      DEPLOY_PATH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_path || vars.DEPLOY_PATH }}
    steps:
      - name: Deploy over SSH
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          DEPLOY_DOTENV: ${{ secrets.DEPLOY_DOTENV }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ssh.zero0ne.dev
          port: 2222
          username: ChanwooSong
          password: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          envs: DEPLOY_REF,DEPLOY_PATH,DEPLOY_DOTENV,DEPLOY_SSH_PASSWORD
          script_stop: true
          request_pty: true
          command_timeout: 30m
          script: |
            bash -se <<'BASH'
            set -Eeuo pipefail
            trap 'rc=$?; echo "[deploy] failed (exit ${rc}) at line ${LINENO}: ${BASH_COMMAND}" >&2; exit ${rc}' ERR

            PROJECT_DIR="${DEPLOY_PATH:-$HOME/Code01}"
            REF_TO_DEPLOY="${DEPLOY_REF:-main}"
            COMPOSE_CMD=""
            SUDO_MODE="none"

            run_privileged() {
              local cmd="$1"
              if [ "$SUDO_MODE" = "none" ]; then
                sh -lc "$cmd"
              elif [ "$SUDO_MODE" = "nopass" ]; then
                sudo -n sh -lc "$cmd"
              else
                printf '%s\n' "${DEPLOY_SSH_PASSWORD}" | sudo -S -k -p '' sh -lc "$cmd"
              fi
            }

            cd "$PROJECT_DIR"
            echo "[deploy] project dir: $PROJECT_DIR"
            echo "[deploy] ref: $REF_TO_DEPLOY"

            if [ -n "${DEPLOY_DOTENV:-}" ]; then
              printf '%s' "$DEPLOY_DOTENV" > .env
              chmod 600 .env
            fi

            git fetch --all --prune
            git checkout "$REF_TO_DEPLOY"
            git pull --ff-only origin "$REF_TO_DEPLOY"

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "[deploy] docker compose command not found for current user" >&2
              exit 1
            fi

            if command -v sudo >/dev/null 2>&1; then
              if sudo -n true >/dev/null 2>&1; then
                SUDO_MODE="nopass"
              else
                if [ -z "${DEPLOY_SSH_PASSWORD:-}" ]; then
                  echo "[deploy] DEPLOY_SSH_PASSWORD is empty" >&2
                  exit 1
                fi
                SUDO_MODE="password"
              fi
            fi

            echo "[deploy] compose: $COMPOSE_CMD"
            echo "[deploy] sudo mode: $SUDO_MODE"

            run_privileged "whoami"
            run_privileged "docker --version"
            run_privileged "$COMPOSE_CMD version"
            run_privileged "$COMPOSE_CMD up -d --build"
            BASH
